name: bluebuild
on:
  schedule:
    - cron:
        "00 06 * * *" # build at 06:00 UTC every day
        # (20 minutes after last ublue images start building)
  push:
    paths-ignore: # don't rebuild if only documentation has changed
      - "**.md"

  pull_request:
  workflow_dispatch: # allow manually triggering builds
concurrency:
  # only run one build at a time
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false # stop GH from cancelling all matrix builds if one fails
      matrix:
        recipe:
          # !! Add your recipes here
          - recipe.yml
    steps:
      # the build is fully handled by the reusable github action
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11
        with:
          recipe: ${{ matrix.recipe }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          build_opts: "--no-sign"

          # enabled by default, disable if your image is small and you want faster builds
          maximize_build_space: true

  # --- NUEVO TRABAJO PARA GENERAR LA ISO AUTOMÁTICAMENTE ---
  build-iso:
    name: Generate ISO
    runs-on: ubuntu-latest
    needs: bluebuild # Espera a que la imagen termine de compilarse
    permissions:
      contents: read
      packages: read
    steps:
      - name: Autenticarse en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Generar el instalador ISO
        uses: jasonn3/build-container-installer@main
        with:
          arch: x86_64
          image_name: nostromos
          image_repo: ghcr.io/${{ github.repository_owner }}
          image_tag: latest
          version: 42
          variant: Kinoite
          iso_name: nostromos-installer.iso
          flatpak_remote_refs: "com.valvesoftware.Steam com.discordapp.Discord com.google.Chrome com.visualstudio.code"
      
      - name: Subir ISO a GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nostromOS-ISO
          path: ./nostromos-installer.iso
